name: Fetch UBC Status Feed

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # also lets you run it manually from the Actions tab
  push:
    branches: [main]          # and on every push, so you see updates immediately

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch feed
        run: curl -sSL https://status.it.ubc.ca/history.atom -o feed.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "Update feed $(date -u +%FT%TZ)"
          git push
