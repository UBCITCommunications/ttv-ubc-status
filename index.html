<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC IT — Upcoming Maintenance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    display: flex;
    height: 100vh;
  }

  /* LEFT — featured item */
  .featured {
    flex: 1;
    padding: 6vh 6vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid #21262d;
  }
  .label {
    font-size: 1.1vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #7d8590;
    margin-bottom: 2vh;
  }
  .service {
    font-size: 4.5vw;
    font-weight: 600;
    line-height: 1.05;
    margin-bottom: 4vh;
    letter-spacing: -0.02em;
  }
  .when {
    font-size: 2vw;
    color: #58a6ff;
    margin-bottom: 4vh;
    font-weight: 400;
  }
  .desc {
    font-size: 1.4vw;
    color: #c9d1d9;
    line-height: 1.5;
    max-width: 90%;
  }
  .counter {
    margin-top: auto;
    font-size: 0.9vw;
    letter-spacing: 0.3em;
    color: #484f58;
    text-transform: uppercase;
  }

  /* RIGHT — upcoming list */
  .queue {
    width: 28vw;
    padding: 6vh 2.5vw;
    background: #010409;
    display: flex;
    flex-direction: column;
  }
  .queue-label {
    font-size: 1vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #7d8590;
    margin-bottom: 4vh;
  }
  .queue-item {
    padding: 1.5vh 0;
    border-bottom: 1px solid #21262d;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .queue-item.current {
    opacity: 1;
  }
  .queue-item.current .dot {
    background: #58a6ff;
    box-shadow: 0 0 0.8vw #58a6ff;
  }
  .dot {
    display: inline-block;
    width: 0.6vw;
    height: 0.6vw;
    border-radius: 50%;
    background: #484f58;
    margin-right: 0.8vw;
    vertical-align: middle;
  }
  .qname {
    font-size: 1.15vw;
    font-weight: 500;
    display: inline-block;
    vertical-align: middle;
  }
  .qdate {
    font-size: 0.95vw;
    color: #7d8590;
    margin-left: 1.4vw;
    margin-top: 0.3vh;
  }

  .empty {
    margin: auto;
    color: #484f58;
    font-size: 2vw;
  }
</style>
</head>
<body>

<div class="featured" id="featured">
  <div class="empty">Loading…</div>
</div>

<div class="queue" id="queue">
  <div class="queue-label">Up Next</div>
</div>

<script>
const FEED_URL    = 'feed.xml';
const ROTATE_MS   = 12000;        // 12 sec per item
const RELOAD_MS   = 6 * 60 * 60 * 1000; // re-fetch feed every 6 hours


let items = [];
let idx   = 0;

async function loadFeed() {
  try {
    const res  = await fetch(FEED_URL + '?t=' + Date.now()); // cache bust
    const text = await res.text();
    const xml  = new DOMParser().parseFromString(text, 'text/xml');
    const entries = [...xml.querySelectorAll('entry')];

    const now = new Date();
    items = entries
      .map(parseEntry)
      .filter(e => e.isScheduled && e.start > now)
      .sort((a, b) => a.start - b.start);

    renderQueue();
    if (items.length === 0) {
      document.getElementById('featured').innerHTML =
        '<div class="empty">No upcoming maintenance scheduled.</div>';
    } else {
      idx = idx % items.length;
      renderFeatured();
    }
  } catch (e) {
    console.error('Feed load failed:', e);
  }
}

function parseEntry(entry) {
  const title    = entry.querySelector('title')?.textContent.trim() ?? '';
  const content  = entry.querySelector('content')?.textContent ?? '';
  const published = new Date(entry.querySelector('published')?.textContent);

  // Detect scheduled events by the giveaway phrase in content
  const isScheduled = /THIS IS A SCHEDULED EVENT/i.test(content);

  // Extract a clean description: strip HTML, grab the "Scheduled - ..." sentence
  const stripped = content
    .replace(/<[^>]+>/g, ' ')
    .replace(/&[a-z]+;/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  // Pull the bit after "Scheduled - " up to ~200 chars
  const match = stripped.match(/Scheduled\s*-\s*([^.]+\.[^.]*)/i);
  const desc = (match ? match[1] : stripped).trim().slice(0, 240);

  // Service name: strip the date part from the title
  const service = title.replace(/\s+(May|June|July|August|September|October|November|December|January|February|March|April|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d.*$/i, '').trim();

  return {
    title, service, desc, isScheduled,
    start: published,
    when: formatWhen(published, title, content)
  };
}

function formatWhen(date, title, content) {
  // Try to pull the time window from the title (e.g. "07:00-15:00 PT")
  const timeMatch = title.match(/(\d{1,2}:\d{2})\s*[-–to]+\s*(\d{1,2}:\d{2})/i);
  const day  = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const time = timeMatch ? ` · ${timeMatch[1]}–${timeMatch[2]} PT` : '';
  return day + time;
}

function renderFeatured() {
  const it = items[idx];
  document.getElementById('featured').innerHTML = `
    <div class="label">Upcoming Maintenance</div>
    <div class="service">${escapeHtml(it.service)}</div>
    <div class="when">${escapeHtml(it.when)}</div>
    <div class="desc">${escapeHtml(it.desc)}</div>
    <div class="counter">${idx + 1} of ${items.length}</div>
  `;
}

function renderQueue() {
  const q = document.getElementById('queue');
  q.innerHTML = '<div class="queue-label">Up Next</div>';
  items.slice(0, 8).forEach((it, i) => {
    const el = document.createElement('div');
    el.className = 'queue-item' + (i === idx ? ' current' : '');
    el.innerHTML = `
      <div><span class="dot"></span><span class="qname">${escapeHtml(shortName(it.service))}</span></div>
      <div class="qdate">${escapeHtml(shortDate(it.start))}</div>
    `;
    q.appendChild(el);
  });
}

function shortName(s) {
  return s.length > 32 ? s.slice(0, 30) + '…' : s;
}
function shortDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function rotate() {
  if (items.length === 0) return;
  idx = (idx + 1) % items.length;
  renderFeatured();
  renderQueue();
}

loadFeed();
setInterval(rotate, ROTATE_MS);
setInterval(loadFeed, RELOAD_MS);
</script>
</body>
</html>
